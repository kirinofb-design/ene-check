            const userEmail = userEmailRaw || (userIdRaw.includes("@") ? userIdRaw : "");
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            const transient = (m) => {
              const s = String(m || "").toLowerCase();
              return s.includes("err_insufficient_resources") || s.includes("target page, context or browser has been closed");
            };
            (async () => {
              const url = `${base}/api/collect/system`;
              const payload = { system, startDate, endDate };
              if (userId) payload.userId = userId;
              else if (userEmail) payload.userEmail = userEmail;
              let last = null;
              for (let attempt = 1; attempt <= 3; attempt++) {
                const res = await fetch(url, { method: "POST", headers: { "content-type": "application/json", authorization: `Bearer ${secret}` }, body: JSON.stringify(payload) });
                const json = await res.json().catch(() => ({}));
                const ok = Boolean(json.ok);
                console.log(JSON.stringify({ system, attempt, status: res.status, ok, message: json.message ?? "" }));
                if (ok) return;
                last = json;
                if (!transient(json.message) || attempt === 3) break;
                await sleep(attempt === 1 ? 1500 : 3500);
              }
              console.error(JSON.stringify({ system, ok: false, message: last?.message ?? "collector failed" }));
              process.exit(1);
            })().catch((e) => { console.error(String(e)); process.exit(1); });
          '

